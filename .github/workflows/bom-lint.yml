name: BOM lint

on:
  pull_request:
    paths:
      - 'hardware/**/bom.csv'
      - '.github/workflows/scripts/bom.schema.json'
      - '.github/workflows/bom-lint.yml'
      - '.github/workflows/scripts/bom_lint.py'
  push:
    branches: [main]
    paths:
      - 'hardware/**/bom.csv'
      - '.github/workflows/scripts/bom.schema.json'
  workflow_dispatch:

jobs:
  bom-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Validate BOMs against the RAD BOM schema
        run: python .github/workflows/scripts/bom_lint.py
