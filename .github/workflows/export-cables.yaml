name: Export Cable Harness Diagrams

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  export-cables:
    name: Render Wireviz harness PDFs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Wireviz
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y graphviz python3-pip
          pip install wireviz==0.3.2

      - name: Generate harness diagrams
        run: |
          chmod +x .github/workflows/scripts/export-cables.sh
          ./.github/workflows/scripts/export-cables.sh

      - name: Upload artifact (manual run)
        if: github.event_name != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: ossm-cables
          path: cable-export/

      - name: Attach to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: cable-export/*
