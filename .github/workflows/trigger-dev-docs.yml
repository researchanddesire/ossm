name: Trigger dev-docs rebuild

on:
  push:
    branches: [main]
    paths:
      - 'developer-docs/**'

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Request dev-docs site rebuild
        run: |
          curl -sS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.DOCS_DISPATCH_TOKEN }}" \
            https://api.github.com/repos/researchanddesire/dev-docs/dispatches \
            -d '{"event_type":"dev-docs-rebuild","client_payload":{"repo":"ossm","ref":"'"${{ github.ref_name }}"'"}}'
